<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>和風の電卓</title>
  <style>
    :root {
      color-scheme: light dark;
      /* 隼風（白舟書体）— Adobe Fonts / ローカルインストール時の名称差に対応 */
      --font-shunpu: "隼風", "Shunpu", "Shunpu Std", "SBTH-Shunpu-R",
        "Adobe 隼風", "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }

    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(
          135deg,
          rgba(7, 21, 47, 0.42) 0%,
          rgba(20, 35, 62, 0.38) 50%,
          rgba(41, 24, 15, 0.45) 100%
        ),
        url("DragonTiger.jpg") center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse at 50% 40%,
        rgba(0, 0, 0, 0.12) 0%,
        rgba(5, 12, 28, 0.35) 100%
      );
    }

    .calculator {
      font-family: var(--font-shunpu);
      width: min(96vw, 520px);
      max-width: 100%;
      background: linear-gradient(160deg, #132b57 0%, #0d2145 100%);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(7, 20, 44, 0.35);
      border: 1px solid #c8a96b;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .calculator::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        145deg,
        rgba(236, 211, 153, 0.18) 0%,
        rgba(236, 211, 153, 0.04) 34%,
        rgba(236, 211, 153, 0.14) 100%
      );
    }

    .title {
      color: #f3dfb2;
      text-align: center;
      font-size: 22px;
      margin: 0 0 10px;
      letter-spacing: 0.12em;
      text-shadow: 0 1px 0 rgba(20, 33, 62, 0.8);
      position: relative;
      z-index: 1;
    }

    .display-wrap {
      width: 100%;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    #display {
      font-family: var(--font-shunpu);
      width: 100%;
      box-sizing: border-box;
      min-height: 72px;
      border: none;
      border-radius: 8px;
      padding: 14px 14px;
      font-size: 28px;
      line-height: 1.35;
      text-align: right;
      color: #0e2348;
      background: #f4fbff;
      border: 1px solid #bfdcff;
      position: relative;
      z-index: 1;
      white-space: nowrap;
      overflow: hidden;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    button {
      height: 58px;
      border: 1px solid #f3dfb2;
      border-radius: 8px;
      font-size: 22px;
      cursor: pointer;
      background: #a8d9ff;
      color: #0a234c;
      font-family: inherit;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    button:hover {
      filter: brightness(1.15);
    }

    .op {
      background: #80c6ff;
    }

    .eq {
      background: #6ab8ff;
      grid-column: span 2;
    }

    .clear {
      background: #5fb0ff;
    }
  </style>
</head>
<body>
  <main class="calculator">
    <p class="title">和算機</p>
    <div class="display-wrap">
      <input id="display" type="text" value="0" readonly />
    </div>
    <div class="buttons">
      <button class="clear" data-action="clear">全消</button>
      <button data-action="delete">戻</button>
      <button class="op" data-value="%">余</button>
      <button class="op" data-value="/">除</button>

      <button data-value="7">七</button>
      <button data-value="8">八</button>
      <button data-value="9">九</button>
      <button class="op" data-value="*">乗</button>

      <button data-value="4">四</button>
      <button data-value="5">五</button>
      <button data-value="6">六</button>
      <button class="op" data-value="-">減</button>

      <button data-value="1">一</button>
      <button data-value="2">二</button>
      <button data-value="3">三</button>
      <button class="op" data-value="+">加</button>

      <button data-value="0">零</button>
      <button data-value=".">点</button>
      <button class="eq" data-action="equals">計</button>
    </div>
  </main>

  <script>
    const display = document.getElementById("display");
    const buttons = document.querySelector(".buttons");
    const DISPLAY_FONT_MAX_PX = 28;
    const DISPLAY_FONT_MIN_PX = 10;
    let expression = "0";
    /** 「計」直後の数値だけ位取り漢数字で表示する */
    let lastResultFromEquals = false;

    const displayMap = {
      "0": "零",
      "1": "一",
      "2": "二",
      "3": "三",
      "4": "四",
      "5": "五",
      "6": "六",
      "7": "七",
      "8": "八",
      "9": "九",
      "+": "加",
      "-": "減",
      "*": "乗",
      "/": "除",
      "%": "余",
      ".": "点",
    };

    function toKanjiDisplay(text) {
      return [...text]
        .map((char) => displayMap[char] ?? char)
        .join("");
    }

    const digitKanji = [
      "零",
      "一",
      "二",
      "三",
      "四",
      "五",
      "六",
      "七",
      "八",
      "九",
    ];

    /** 0–9999 を位取りの漢数字で表す（例: 1234 → 千二百三十四） */
    function fourDigitsToKanji(n) {
      if (n === 0) return "";
      const q = Math.floor(n / 1000);
      const h = Math.floor((n % 1000) / 100);
      const t = Math.floor((n % 100) / 10);
      const o = n % 10;
      let s = "";
      if (q > 0) s += q === 1 ? "千" : digitKanji[q] + "千";
      if (h > 0) s += h === 1 ? "百" : digitKanji[h] + "百";
      if (t > 0) s += t === 1 ? "十" : digitKanji[t] + "十";
      if (o > 0) s += digitKanji[o];
      return s;
    }

    /** 非負整数を位取りの漢数字で表す（万・億・兆の単位を含む） */
    function intToKanjiPlaceValue(n) {
      if (n === 0) return "零";
      const chunks = [];
      let num = n;
      while (num > 0) {
        chunks.push(num % 10000);
        num = Math.floor(num / 10000);
      }
      const unitNames = ["", "万", "億", "兆", "京"];
      let s = "";
      for (let i = chunks.length - 1; i >= 0; i--) {
        if (chunks[i] === 0) continue;
        const part = fourDigitsToKanji(chunks[i]);
        s += part + (unitNames[i] ?? "");
      }
      return s;
    }

    function isNumericOnlyExpression(text) {
      return /^-?\d+(\.\d+)?$/.test(text);
    }

    /** 計算結果など「数値だけ」の文字列を位取り漢数字で表示 */
    function numberStringToKanjiPlaceValue(str) {
      if (!isNumericOnlyExpression(str)) return toKanjiDisplay(str);
      const negative = str.startsWith("-");
      const absStr = negative ? str.slice(1) : str;
      const [intPartStr, fracPartStr] = absStr.split(".");
      const intVal = parseInt(intPartStr, 10);
      if (!Number.isFinite(intVal)) return toKanjiDisplay(str);

      let out = negative ? "負" : "";
      out += intToKanjiPlaceValue(intVal);

      if (fracPartStr !== undefined) {
        out += "点";
        for (const ch of fracPartStr) {
          if (ch >= "0" && ch <= "9") out += digitKanji[Number(ch)];
          else out += ch;
        }
      }

      return out;
    }

    function fitDisplayFont() {
      display.style.fontSize = `${DISPLAY_FONT_MAX_PX}px`;
      let size = DISPLAY_FONT_MAX_PX;
      while (
        display.scrollWidth > display.clientWidth &&
        size > DISPLAY_FONT_MIN_PX
      ) {
        size -= 1;
        display.style.fontSize = `${size}px`;
      }
    }

    function updateDisplay() {
      if (expression === "Error") {
        display.value = "不能";
      } else {
        const usePlaceValue =
          lastResultFromEquals && isNumericOnlyExpression(expression);
        display.value = usePlaceValue
          ? numberStringToKanjiPlaceValue(expression)
          : toKanjiDisplay(expression);
      }
      requestAnimationFrame(() => {
        fitDisplayFont();
      });
    }

    function isOperator(char) {
      return ["+", "-", "*", "/", "%"].includes(char);
    }

    function appendValue(value) {
      lastResultFromEquals = false;
      if (expression === "0" && value !== ".") {
        expression = value;
        return;
      }

      const lastChar = expression[expression.length - 1];

      if (isOperator(lastChar) && isOperator(value)) {
        expression = expression.slice(0, -1) + value;
        return;
      }

      expression += value;
    }

    function clearAll() {
      lastResultFromEquals = false;
      expression = "0";
    }

    function deleteOne() {
      lastResultFromEquals = false;
      if (expression.length <= 1) {
        expression = "0";
      } else {
        expression = expression.slice(0, -1);
      }
    }

    function calculate() {
      try {
        const result = Function(`"use strict"; return (${expression})`)();
        expression = Number.isFinite(result) ? String(result) : "Error";
        lastResultFromEquals = expression !== "Error";
      } catch {
        expression = "Error";
        lastResultFromEquals = false;
      }
    }

    function handleInput(action, value) {
      if (action === "clear") clearAll();
      else if (action === "delete") deleteOne();
      else if (action === "equals") calculate();
      else if (value) appendValue(value);

      if (expression === "Error" && action !== "clear") {
        expression = "0";
      }

      updateDisplay();
    }

    buttons.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const { action, value } = button.dataset;
      handleInput(action, value);
    });

    document.addEventListener("keydown", (event) => {
      const { key } = event;

      if (/^[0-9]$/.test(key)) {
        handleInput(undefined, key);
        return;
      }

      if (key === ".") {
        handleInput(undefined, ".");
        return;
      }

      if (["+", "-", "*", "/", "%"].includes(key)) {
        handleInput(undefined, key);
        return;
      }

      if (key === "Enter" || key === "=") {
        event.preventDefault();
        handleInput("equals");
        return;
      }

      if (key === "Backspace") {
        handleInput("delete");
        return;
      }

      if (key === "Escape" || key.toLowerCase() === "c") {
        handleInput("clear");
      }
    });

    updateDisplay();
    window.addEventListener("resize", () => {
      fitDisplayFont();
    });
    const displayWrap = document.querySelector(".display-wrap");
    if (displayWrap && typeof ResizeObserver !== "undefined") {
      new ResizeObserver(() => fitDisplayFont()).observe(displayWrap);
    }
  </script>
</body>
</html>
